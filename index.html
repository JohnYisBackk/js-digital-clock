<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Digital Clock</title>
  </head>
  <body>
    <button id="themeToggle" class="theme-toggle">🌙</button>

    <main class="app">
      <section class="clock-card">
        <p class="eyebrow">Digital Clock PRO</p>
        <h1 class="title">Modern Digital Clock</h1>
        <p class="subtitle">A clean and stylish live clock.</p>

        <div class="clock-box">
          <div id="clockTime" class="clock-time">00:00:00</div>
          <div id="clockDay" class="clock-day">Monday</div>
          <div id="clockDate" class="clock-date">March 9, 2026</div>
        </div>
      </section>
    </main>
  </body>
</html>
